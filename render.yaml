services:
  - type: web
    name: gold-agent
    runtime: python
    buildCommand: pip install -r gold-agent/requirements.txt
    startCommand: cd gold-agent && python main.py
    # Render free tier sleeps after 15 min of no HTTP requests.
    # The background scheduler thread keeps trading alive regardless,
    # but set healthCheckPath so Render's own monitor keeps the process warm.
    healthCheckPath: /
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: USD_THB_RATE
        value: "34.5"
      - key: TRADE_FEE_PCT
        value: "0.005"
      - key: TRADE_FEE_FLAT_THB
        value: "0"
      - key: TRADE_LOOP_INTERVAL_SEC
        value: "300"
