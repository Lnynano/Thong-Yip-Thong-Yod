services:
  - type: web
    name: gold-agent
    runtime: python
    buildCommand: pip install -r gold-agent/requirements.txt
    startCommand: cd gold-agent && python main.py
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: USD_THB_RATE
        value: "34.5"